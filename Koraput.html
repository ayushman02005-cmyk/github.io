<html>
<head>
  <title>Koraput</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      background-image: url('https://www.datocms-assets.com/32623/1738619740-bern_switzerland-1.jpg?auto=format');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      color: #0000ff;
      margin-top: 50px;
      align-items: center;
      font-size: 60px;
    }

    .center-controls {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-top: 30px;
      gap: 10px;
    }

    select, button {
      padding: 10px;
      font-size: 16px;
    }

    select {
      background-color: #2652ad;
      color: white;
    }

    button {
      background-color: #0033cc;
      color: white;
      cursor: pointer;
    }
  </style>

  <script>
    function redirectToLink() {
      const selection = document.getElementById("placeType").value;
      if (selection) {
        window.location.href = selection;
      } else {
        alert("Please select a service before searching.");
      }
    }
  </script>
</head>
<body>
  <h1>Find Nearby Services</h1>

  <div class="center-controls">
    <select id="placeType">
      <option value="">-- Select --</option>
      <option value="https://maps.app.goo.gl/Kp4Kpiwp1q4GddDs5">Hospitals 🏥</option>
      <option value="https://maps.app.goo.gl/hojXK1gL4zgnAKVs8">Schools 🏫</option>
      <option value="https://www.google.com/maps/search/all+++police+station+in+Koraput+district+/@18.8041848,82.7234616,15z/data=!3m1!4b1?entry=ttu&g_ep=EgoyMDI1MDYyNi4wIKXMDSoASAFQAw%3D%3D">Police Stations 👮‍♂️</option>
      <option value="https://www.google.com/maps/place/Fire+station,+Koraput,+Odisha./@18.8078542,82.7043289,17z/data=!3m1!4b1!4m6!3m5!1s0x3a3af058a6081cf3:0xdd350ef9f8dc03e4!8m2!3d18.8078542!4d82.7069038!16s%2Fg%2F11d_cxtnzd?entry=ttu&g_ep=EgoyMDI1MDYyNi4wIKXMDSoASAFQAw%3D%3D">Fire Stations 🚒</option>
      <option value="https://maps.app.goo.gl/DtZKvU8ecPUT4D2K7">Medicine Stores 💊</option>
    </select>

    <button onclick="redirectToLink()">Search Nearby</button>
  </div>
</body>
</html>
