<html>
<head>
  <title>Sundargarh</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      background-image: url('https://www.datocms-assets.com/32623/1738619740-bern_switzerland-1.jpg?auto=format');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      color: #0000ff;
      margin-top: 50px;
      align-items: center;
      font-size: 60px;
    }

    .center-controls {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-top: 30px;
      gap: 10px;
    }

    select, button {
      padding: 10px;
      font-size: 16px;
    }

    select {
      background-color: #2652ad;
      color: white;
    }

    button {
      background-color: #0033cc;
      color: white;
      cursor: pointer;
    }
  </style>

  <script>
    function redirectToLink() {
      const selection = document.getElementById("placeType").value;
      if (selection) {
        window.location.href = selection;
      } else {
        alert("Please select a service before searching.");
      }
    }
  </script>
</head>
<body>
  <h1>Find Nearby Services</h1>

  <div class="center-controls">
    <select id="placeType">
      <option value="">-- Select --</option>
      <option value="https://maps.app.goo.gl/LA4wLuGPrbTdmJnW7">Hospitals 🏥</option>
      <option value="https://maps.app.goo.gl/AAEwSdrgFnaQq9Ry6">Schools 🏫</option>
      <option value="https://www.google.com/maps/place/Town+Police+Station/@22.12051,84.0310771,17z/data=!3m1!4b1!4m6!3m5!1s0x3a20ecb720d8dcdd:0x1c3a655f9ff42e82!8m2!3d22.12051!4d84.033652!16s%2Fg%2F1tgx0fnx?entry=ttu&g_ep=EgoyMDI1MDYyNi4wIKXMDSoASAFQAw%3D%3D">Police Stations 👮‍♂️</option>
      <option value="https://www.google.com/maps/place/Fire+Station/@22.1146694,84.0436137,17z/data=!3m1!4b1!4m6!3m5!1s0x3a20ecc4fa295031:0xdb547d3468ab3127!8m2!3d22.1146694!4d84.0461886!16s%2Fg%2F11c1tmh83y?entry=ttu&g_ep=EgoyMDI1MDYyNi4wIKXMDSoASAFQAw%3D%3D">Fire Stations 🚒</option>
      <option value="https://maps.app.goo.gl/bgzmHUDc7umMLsTo8">Medicine Stores 💊</option>
    </select>

    <button onclick="redirectToLink()">Search Nearby</button>
  </div>
</body>
</html>
