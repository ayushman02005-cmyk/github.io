<html>
<head>
  <title>Jagatsinghpur</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      background-image: url('https://www.datocms-assets.com/32623/1738619740-bern_switzerland-1.jpg?auto=format');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      color: #0000ff;
      margin-top: 50px;
      align-items: center;
      font-size: 60px;
    }

    .center-controls {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-top: 30px;
      gap: 10px;
    }

    select, button {
      padding: 10px;
      font-size: 16px;
    }

    select {
      background-color: #2652ad;
      color: white;
    }

    button {
      background-color: #0033cc;
      color: white;
      cursor: pointer;
    }
  </style>

  <script>
    function redirectToLink() {
      const selection = document.getElementById("placeType").value;
      if (selection) {
        window.location.href = selection;
      } else {
        alert("Please select a service before searching.");
      }
    }
  </script>
</head>
<body>
  <h1>Find Nearby Services</h1>

  <div class="center-controls">
    <select id="placeType">
      <option value="">-- Select --</option>
      <option value="https://maps.app.goo.gl/JbmZgoeLRtpifKc97">Hospitals 🏥</option>
      <option value="https://maps.app.goo.gl/S9WANGC9usVwCNXG7">Schools 🏫</option>
      <option value="https://www.google.com/maps/place/Jagatsinghpur+Police+Station/@20.2512471,86.176383,1088m/data=!3m2!1e3!4b1!4m6!3m5!1s0x3a19818641ade4c7:0x8427122d2f9c943a!8m2!3d20.2512471!4d86.1789579!16s%2Fg%2F1td6dx40?entry=ttu&g_ep=EgoyMDI1MDYyNi4wIKXMDSoASAFQAw%3D%3D">Police Stations 👮‍♂️</option>
      <option value="https://www.google.com/maps/place/Jagatsinghpur+Fire+Station/@20.252358,86.1910118,1088m/data=!3m2!1e3!4b1!4m6!3m5!1s0x3a198198487bf609:0x479dd77aed886571!8m2!3d20.252358!4d86.1935867!16s%2Fg%2F11fzf9rsj_?entry=ttu&g_ep=EgoyMDI1MDYyNi4wIKXMDSoASAFQAw%3D%3D">Fire Stations 🚒</option>
      <option value="https://maps.app.goo.gl/WoZxp9cHGQCLizE29">Medicine Stores 💊</option>
    </select>

    <button onclick="redirectToLink()">Search Nearby</button>
  </div>
</body>
</html>
